- name: Build Binary with All Tags
        run: |
          # 1. 找到包含 main.go 的目录（通常是 cmd/picoclaw）
          MAIN_DIR=$(find . -name "main.go" -path "*/picoclaw/*" | xargs dirname)
          echo "Building from: $MAIN_DIR"
          
          # 2. 进入该目录执行构建
          cd "$MAIN_DIR"
          
          # 3. 核心构建命令
          # -tags "all" 确保激活 wecom_aibot
          # -o ../../picoclaw-linux-amd64 将编译好的文件放回根目录
          go build -v -tags "all" -

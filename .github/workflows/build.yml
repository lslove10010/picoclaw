name: Build PicoClaw Full Version

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' 
          cache: true

      - name: Physical Patch for Embed
        run: |
          # 1. 确认根目录下有 workspace 文件夹
          if [ -d "workspace" ]; then
            # 2. 物理复制根目录的 workspace 到报错的子目录
            # 使用 -r 递归复制，确保它是真实目录而不是软链接
            mkdir -p cmd/picoclaw/internal/onboard/
            cp -r workspace cmd/picoclaw/internal/onboard/
            echo "Physical patch: Copied workspace folder to target."
          else
            # 如果根目录没有，尝试创建一个空的补丁文件夹防止中断
            mkdir -p cmd/picoclaw/internal/onboard/workspace
            touch cmd/picoclaw/internal/onboard/workspace/.gitkeep
            echo "Physical patch: Created empty workspace folder."
          fi

      - name: Build Full Binary
        run: |
          go mod tidy
          # 核心：使用 -tags "all" 开启 WeCom AI Bot 支持
          # 指定入口文件编译，确保 embed 路径对齐
          go build -v -tags "all" -ldflags="-s -w" -o picoclaw-full-amd64 ./cmd/picoclaw/main.go

      - name: Verify Build
        run: |
          chmod +x picoclaw-full-amd64
          ./picoclaw-full-amd64 version
          # 打印帮助信息查看是否有隐藏的 channel 命令（可选）
          ./picoclaw-full-amd64 help

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-full-amd64
          path: picoclaw-full-amd64

name: Build PicoClaw Full Version

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' 
          cache: true

      - name: Fix Path for Embed
        run: |
          # 1. 确认根目录下有 workspace
          ls -d workspace
          
          # 2. 在报错的目录下创建一个软链接指向根目录的 workspace
          # 这样 go:embed workspace 就能通过相对路径找到它了
          mkdir -p cmd/picoclaw/internal/onboard/
          ln -s $(pwd)/workspace cmd/picoclaw/internal/onboard/workspace
          
          echo "Path fix: Created symlink for embed."

      - name: Build Full Binary
        run: |
          go mod tidy
          # 核心：使用 -tags "all" 开启 WeCom AI Bot 支持
          go build -v -tags "all" -ldflags="-s -w" -o picoclaw-full-amd64 ./cmd/picoclaw/main.go

      - name: Verify Capability
        run: |
          chmod +x picoclaw-full-amd64
          # 验证二进制是否包含 version 信息
          ./picoclaw-full-amd64 version

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-full-amd64
          path: picoclaw-linux-amd64
